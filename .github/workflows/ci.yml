name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    # directory/'s tests need a real Postgres (each test gets its own
    # ephemeral DB via sqlx::test) — relay stays on embedded SQLite and
    # needs nothing here.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: directory
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: directory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://directory:ci-password@localhost:5432/directory
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      # ponytail: clippy -D warnings deferred until the code stabilizes after
      # the step-2 engine extraction (existing lint lives in code about to move).
      # Add back: rustup component add clippy + cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # T8 go/no-go gate (ffi-contract.md): Gobley must generate bindings, build
  # the ffi crate, and link per target. Desktop EXECUTES the smoke test;
  # Android proves codegen + NDK cross-compile + link by assembling the APK
  # (running it needs an emulator — deliberately out of CI scope for now).
  # iOS is the timeboxed follow-up per the T8 split gate; no macOS job yet.
  app-ffi-smoke:
    name: app FFI smoke (desktop test + android link)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-app-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: gradle/actions/setup-gradle@v4

      - name: Desktop FFI smoke test (executes bindings)
        run: ./gradlew :engine-kt:desktopTest

      # The app's own tests: the onboarding gate (commonTest) and DirectoryClient's
      # error paths (desktopTest, stub JDK HttpServer). `assembleDebug` below only
      # links, so without this line these never run in CI — and they are the gate
      # that keeps an unverified user out of the app.
      - name: App unit tests (onboarding gate + directory client)
        run: ./gradlew :composeApp:desktopTest

      - name: Android FFI smoke (codegen + cross-compile + link)
        run: ./gradlew :composeApp:assembleDebug
